services:
  - type: web
    name: cold-email-generator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k gthread -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RUN_SCHEDULER
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: FLASK_DEBUG
        value: "false"
